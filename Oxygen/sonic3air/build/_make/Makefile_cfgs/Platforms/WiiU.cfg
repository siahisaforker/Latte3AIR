STATIC = 0
SKIP_PKGCONFIG = 1

include $(DEVKITPRO)/wut/share/wut_rules

PKGCONFIG = $(DEVKITPRO)/portlibs/wiiu/bin/powerpc-eabi-pkg-config
PKGCONFIG_LIBS = ogg vorbis theora vorbisfile theoradec zlib minizip

DEFINES += -D__WUT__ -DPLATFORM_WIIU

# Ensure Wii U portlibs pkg-config files are found
export PKG_CONFIG_PATH := $(DEVKITPRO)/portlibs/wiiu/lib/pkgconfig:$(DEVKITPRO)/portlibs/wiiu/share/pkgconfig

CFLAGS += $(MACHDEP)
LDFLAGS += $(MACHDEP) $(RPXSPECS) -Wl,--gc-sections

INCLUDES += -I$(DEVKITPRO)/wut/include -I$(DEVKITPRO)/portlibs/wiiu/include
INCLUDES += -I$(BASEDIR)/framework/external/ogg-vorbis/libogg/include \
            -I$(BASEDIR)/framework/external/ogg-vorbis/libvorbis/include \
            -I$(BASEDIR)/framework/external/ogg-vorbis/libvorbis/lib \
            -I$(BASEDIR)/framework/external/zlib/zlib \
            -I$(BASEDIR)/framework/external/zlib/zlib/contrib/minizip
LIBPATHS += -L$(DEVKITPRO)/wut/lib -L$(DEVKITPRO)/portlibs/wiiu/lib

LIBPATHS += -L$(DEVKITPRO)/portlibs/ppc/lib

LIBS += -lwhb -lcoreinit -lvpad -lpadscore -lgx2 -lsysapp -lproc_ui -lm -lpthread

# Link against portlibs installed for ppc (zlib/ogg/vorbis/theora/etc.)
LIBS += -lvorbis -lvorbisfile -logg -ltheora -ltheoradec -lz -latomic -lgcc -lwut

SUFFIX = .rpx
